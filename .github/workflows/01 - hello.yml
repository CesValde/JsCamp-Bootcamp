name: 01 - Hello

on:
   push:
      branches: [main]

jobs:
   hello:
      runs-on: ubuntu-24.04
      steps:
         - name: Saludar
           run: echo "Hello from GitHub Actions!"

         - name: See date of runner
           run: date

         - name: See files availables
           run: ls -la

   repo-files:
      runs-on: ubuntu-24.04
      steps:
         - name: Download repository files
           uses: actions/checkout@v6

         - name: List repository files
           run: ls -la
