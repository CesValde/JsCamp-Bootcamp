name: 05 - CI

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

jobs:
   ci:
      runs-on: ubuntu-24.04
      
      defaults:
         run:
            working-directory: 13-ci-cd
      
      steps:
         - name: Checkout code
           uses: actions/checkout@v6

         - name: Prepare pnpm
           uses: pnpm/action-setup@v6
           with:
              version: 11
              run_install: false

         - name: Install dependencies           
           run: pnpm install --frozen-lockfile

         - name: Lint code
           run: pnpm lint

         - name: Test code
           run: pnpm test

         - name: Build
           run: pnpm build
