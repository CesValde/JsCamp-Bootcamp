name: 04 - Events

on:
   issues:
      types: [opened, reopened]
   issue_comment:
      types: [created]

jobs:
   inspect-event:
      runs-on: ubuntu-24.04
      permissions:
         issues: write

      steps:
         - name: Inspect event
           run: |
              echo "Event: ${{ github.event_name }}"
              echo "issue: ${{ github.event.issue.number }}"
              echo "comment: ${{ github.event.comment.body }}"

         - name: Comment how a bot in GitHub Actions
           if: ${{ github.event_name == 'issues' && github.event.action == 'opened' }}
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              ISSUE_NUMBER: ${{ github.event.issue.number }}
              GITHUB_REPOSITORY: ${{ github.repository }}
           run: |
              gh issue comment "$ISSUE_NUMBER" --body "Thanks for opening this issue! We will look into it as soon as possible." --repo "$GITHUB_REPOSITORY"

         - name: Comment as repository owner in GitHub Actions
           if: github.event_name == 'issues' && github.event.action == 'opened'
           env:
              AUTHOR_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
              ISSUE_NUMBER: ${{ github.event.issue.number }}
           run: |
              if [[ -z "$AUTHOR_TOKEN" ]]; then
                 echo "::warning::PERSONAL_ACCESS_TOKEN is not set. Skipping comment as repository owner."
                 exit 0
              fi
              GH_TOKEN="$AUTHOR_TOKEN" gh issue comment "$ISSUE_NUMBER" \
                 --repo "$GITHUB_REPOSITORY" \
                 --body "Hello, I am the owner of the repository responding personally. Please check the contribution guide in the meantime."
