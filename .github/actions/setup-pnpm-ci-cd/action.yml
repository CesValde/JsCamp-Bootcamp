name: Setup pnpm and Node for CI/CD
description: This action sets up pnpm and Node.js for CI/CD workflows.

inputs:
   node-version:
      description: "Node.js version"
      required: false
      default: "22"
   pnpm-version:
      description: "pnpm version"
      required: false
      default: "10.0"

runs:
   using: "composite"
   steps:
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
           version: ${{ inputs.pnpm-version }}
           run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
           node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        shell: bash
        run: |
           cd 13-ci-cd
           pnpm install --frozen-lockfile
